<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна робота №2</title>
</head>
<body>
    <h1>Результати лабораторної роботи №2 дивіться у консолі (F12)</h1>

    <script>
        // --- 1.2.3 Об'єкт car1 ---
        var car1 = new Object();
        car1.color = "Red";
        car1.maxSpeed = 220;
        car1.driver = {
            name: "Твоє Прізвище та Ім'я",
            category: "C",
            "personal limitations": "No driving at night"
        };
        car1.tuning = true;
        car1["number of accidents"] = 0;

        // --- 1.2.4 Об'єкт car2 ---
        var car2 = {
            color: "Blue",
            maxSpeed: 190,
            driver: {
                name: "Твоє Прізвище та Ім'я",
                category: "B",
                "personal limitations": null
            },
            tuning: false,
            "number of accidents": 2
        };

        // --- 1.2.5 - 1.2.6 Методи drive ---
        car1.drive = function() {
            console.log("I am not driving at night");
        };
        car2.drive = function() {
            console.log("I can drive anytime");
        };

        console.log("--- Перевірка Кроку 1 ---");
        car1.drive();
        car2.drive();

        // --- 1.2.7 Конструктор Truck ---
        function Truck(color, weight, avgSpeed, brand, model) {
            this.color = color;
            this.weight = weight;
            this.avgSpeed = avgSpeed;
            this.brand = brand;
            this.model = model;

            // 1.2.9 Метод trip
            this.trip = function() {
                if (!this.driver) {
                    console.log("No driver assigned");
                } else {
                    var msg = "Driver " + this.driver.name;
                    msg += this.driver.nightDriving ? " drives at night" : " does not drive at night";
                    msg += " and has " + this.driver.experience + " years of experience";
                    console.log(msg);
                }
            };
        }

        // 1.2.8 Метод AssignDriver через prototype
        Truck.prototype.AssignDriver = function(name, nightDriving, experience) {
            this.driver = {
                name: name,
                nightDriving: nightDriving,
                experience: experience
            };
        };

        // 1.2.10 Створення об'єктів Truck
        var truck1 = new Truck("White", 8000, 70, "MAN", "TGX");
        var truck2 = new Truck("Yellow", 5500, 85, "Mercedes", "Actros");

        truck1.AssignDriver("Олександр Іванов", true, 5);
        truck2.AssignDriver("Дмитро Петренко", false, 2);

        console.log("--- Перевірка Кроку 2 ---");
        truck1.trip();
        truck2.trip();

        // 1.2.12 - 1.2.15 Клас Square (Квадрат) [cite: 53-56]
class Square {
    constructor(a) {
        this.a = a; // сторона квадрата [cite: 55]
    }

    // Статичний метод [cite: 57]
    static help() {
        console.log("Квадрат — це правильний чотирикутник, у якого всі сторони рівні.");
    }

    length() {
        console.log("Сума довжин сторін (Периметр): " + (4 * this.a)); // [cite: 59]
    }

    square() {
        console.log("Площа: " + (this.a * this.a)); // [cite: 60]
    }

    info() {
        console.log(`Квадрат:
        - Сторони: 4 по ${this.a} [cite: 62]
        - Кути: 4 по 90° [cite: 63]
        - Периметр: ${4 * this.a} [cite: 64]
        - Площа: ${this.a * this.a} [cite: 65]`);
    }
}

// 1.2.16 - 1.2.17 Клас Rectangle (Прямокутник), успадкований від Square [cite: 66, 69]
class Rectangle extends Square {
    constructor(a, b) {
        super(a); // викликаємо конструктор батька [cite: 16]
        this.b = b; // ширина прямокутника [cite: 68]
    }

    static help() {
        console.log("Прямокутник — це чотирикутник, у якого всі кути прямі (90°).");
    }

    length() {
        console.log("Сума довжин сторін прямокутника: " + (2 * (this.a + this.b)));
    }

    square() {
        console.log("Площа прямокутника: " + (this.a * this.b));
    }

    info() {
        console.log(`Прямокутник:
        - Сторони: a=${this.a}, b=${this.b}
        - Кути: 4 по 90°
        - Периметр: ${2 * (this.a + this.b)}
        - Площа: ${this.a * this.b}`);
    }
}

// 1.2.18 - 1.2.19 Клас Rhombus (Ромб), успадкований від Square [cite: 75, 78]
class Rhombus extends Square {
    constructor(a, alpha, beta) {
        super(a);
        this.alpha = alpha; // тупий кут [cite: 77]
        this.beta = beta;   // гострий кут [cite: 77]
    }

    static help() {
        console.log("Ромб — це паралелограм, у якого всі сторони рівні.");
    }

    // Площа ромба через сторону та синус кута (приблизно)
    square() {
        let area = (this.a * this.a * Math.sin(this.beta * Math.PI / 180)).toFixed(2);
        console.log("Площа ромба: " + area);
    }

    info() {
        console.log(`Ромб:
        - Сторони: 4 по ${this.a}
        - Кути: alpha=${this.alpha}°, beta=${this.beta}°
        - Периметр: ${4 * this.a}
        - Площа: ${(this.a * this.a * Math.sin(this.beta * Math.PI / 180)).toFixed(2)}`);
    }
}

// 1.2.23 - 1.2.24 Перевірка
console.log("--- Перевірка Кроку 3 ---");
Square.help();
Rectangle.help();
Rhombus.help();

const mySquare = new Square(5);
const myRect = new Rectangle(4, 8);
const myRhombus = new Rhombus(6, 120, 60);

mySquare.info();
myRect.info();
myRhombus.info();
    </script>
</body>
</html>
