<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лабораторна 4 - Сортування</title>
</head>
<body>
    <h1>Результати сортування в консолі (F12)</h1>

    <script src="MySortLib.js"></script>
    <script>
        const regularArray = Array.from({length: 105}, () => Math.floor(Math.random() * 1000));

        const sparseArray = [...regularArray];
        sparseArray[10] = undefined;
        sparseArray[50] = undefined;
        sparseArray[110] = 999; 

        console.log("--- ТЕСТ: Звичайний масив ---");
        MySortLib.bubbleSort(regularArray);
        MySortLib.quickSort(regularArray);

        console.log("\n--- ТЕСТ: Розріджений масив ---");
        MySortLib.insertionSort(sparseArray);
        MySortLib.shellSort(sparseArray);
    </script>
</body>
</html>
