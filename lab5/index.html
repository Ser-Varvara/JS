<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Pixel Hunt - Lab 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Pixel Hunt</h1>
        <div class="controls">
            <label>Choose difficulty: 
                <select id="difficulty">
                    <option value="easy">Easy (2s, Big)</option>
                    <option value="medium">Medium (1.2s, Mid)</option>
                    <option value="hard">Hard (0.7s, Small)</option>
                </select>
            </label>

            <label>Choose color: 
                <select id="color">
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                </select>
            </label>

            <button id="startBtn">Start</button>
            <span id="scoreDisplay">Score: 0</span>
        </div>
    </header>

    <main id="gameArea">
    </main>

    <script src="script.js"></script>
</body>
</html>
